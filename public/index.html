<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0b1020" />
  <title>Buddha Chat</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/assets/icon-192.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar glass">
      <div class="topbar__brand">
        <img class="brand__icon" src="/assets/icon-192.png" alt="Buddha Chat" />
        <div class="brand__meta">
          <div class="brand__title">Buddha Chat</div>
          <div class="brand__subtitle" id="brandSubtitle">secure mobile messenger</div>
        </div>
      </div>
      <button id="btnLogout" class="icon-btn" title="Выйти" aria-label="Выйти">
        <span>⎋</span>
      </button>
    </header>

    <main class="main">
      <section id="authScreen" class="screen screen--center">
        <div class="card glass auth-card">
          <img class="auth-logo" src="/assets/icon-512.png" alt="Buddha Chat" />
          <h1 class="auth-title">Buddha Chat</h1>
          <p class="auth-subtitle">Вход и регистрация без лишнего. Только username и пароль.</p>

          <div class="segmented">
            <button id="tabLogin" class="segmented__item segmented__item--active">Вход</button>
            <button id="tabRegister" class="segmented__item">Регистрация</button>
          </div>

          <form id="authForm" class="form">
            <label class="field">
              <span class="field__label">Username</span>
              <input id="authUsername" type="text" autocomplete="username" placeholder="Введите username" />
            </label>

            <label class="field">
              <span class="field__label">Пароль</span>
              <input id="authPassword" type="password" autocomplete="current-password" placeholder="Введите пароль" />
            </label>

            <button id="authSubmit" type="submit" class="primary-btn">Продолжить</button>
            <p id="authError" class="error-text"></p>
          </form>
        </div>
      </section>

      <section id="messengerScreen" class="screen hidden">
        <div class="layout">
          <aside class="panel panel--list" id="leftPanel">
            <div class="panel__header">
              <h2>Чаты</h2>
              <button id="openSearchBtn" class="pill-btn">Новый чат</button>
            </div>

            <div class="panel__body">
              <div id="chatList" class="chat-list"></div>
            </div>
          </aside>

          <section class="panel panel--chat" id="chatPanel">
            <div id="emptyState" class="empty-state">
              <div class="empty-state__icon">💬</div>
              <div class="empty-state__title">Выбери чат</div>
              <div class="empty-state__text">Или начни новый диалог через поиск пользователя.</div>
            </div>

            <div id="chatView" class="chat-view hidden">
              <div class="chat-header glass">
                <button id="backToChatsBtn" class="icon-btn mobile-only" aria-label="Назад">←</button>
                <div class="chat-header__meta">
                  <div id="chatTitle" class="chat-header__title">Диалог</div>
                  <div id="chatStatus" class="chat-header__status">online</div>
                </div>
                <button id="callBtn" class="icon-btn call-btn" aria-label="Позвонить">📞</button>
              </div>

              <div id="messages" class="messages"></div>

              <form id="composer" class="composer glass">
                <input id="messageInput" type="text" placeholder="Сообщение..." autocomplete="off" />
                <button type="submit" class="send-btn" aria-label="Отправить">➤</button>
              </form>
            </div>
          </section>
        </div>
      </section>
    </main>

    <nav id="bottomNav" class="bottom-nav glass hidden">
      <button id="navChats" class="bottom-nav__item bottom-nav__item--active">
        <span class="bottom-nav__icon">💬</span>
        <span class="bottom-nav__label">Чаты</span>
      </button>
      <button id="navSearch" class="bottom-nav__item">
        <span class="bottom-nav__icon">🔎</span>
        <span class="bottom-nav__label">Поиск</span>
      </button>
      <button id="navProfile" class="bottom-nav__item">
        <span class="bottom-nav__icon">⚙️</span>
        <span class="bottom-nav__label">Профиль</span>
      </button>
    </nav>

    <div id="searchSheet" class="sheet hidden">
      <div class="sheet__backdrop" id="searchSheetBackdrop"></div>
      <div class="sheet__panel glass">
        <div class="sheet__grab"></div>
        <div class="sheet__header">
          <h3>Новый чат</h3>
          <button id="closeSearchBtn" class="icon-btn">✕</button>
        </div>

        <div class="sheet__body">
          <label class="field">
            <span class="field__label">Найти по username</span>
            <div class="search-row">
              <input id="searchInput" type="text" placeholder="username" />
              <button id="searchBtn" class="primary-btn primary-btn--small">Найти</button>
            </div>
          </label>

          <div id="searchResult" class="search-result"></div>
        </div>
      </div>
    </div>

    <div id="profileSheet" class="sheet hidden">
      <div class="sheet__backdrop" id="profileSheetBackdrop"></div>
      <div class="sheet__panel glass">
        <div class="sheet__grab"></div>
        <div class="sheet__header">
          <h3>Профиль</h3>
          <button id="closeProfileBtn" class="icon-btn">✕</button>
        </div>

        <div class="sheet__body">
          <div class="profile-card">
            <div class="profile-card__row">
              <span class="profile-card__label">Username</span>
              <span id="profileUsername" class="profile-card__value">—</span>
            </div>
            <div class="profile-card__row">
              <span class="profile-card__label">Push</span>
              <button id="enablePushBtn" class="pill-btn">Включить уведомления</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="callOverlay" class="call-overlay hidden">
      <div class="call-overlay__card glass">
        <div class="call-overlay__title" id="callOverlayTitle">Вызов</div>
        <div class="call-overlay__subtitle" id="callOverlaySubtitle">Соединение...</div>

        <div class="call-overlay__actions">
          <button id="acceptCallBtn" class="circle-btn circle-btn--accept hidden">✓</button>
          <button id="declineCallBtn" class="circle-btn circle-btn--decline">✕</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>

<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
</body>
</html>
